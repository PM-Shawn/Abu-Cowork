<h2>迷你输入框的样式</h2>
<p class="subtitle">宠物窗口从 80×80 扩展后，输入框的视觉风格。点击选择你喜欢的方向。</p>

<div class="cards">

  <!-- Option A: 简洁药丸 -->
  <div class="card" data-choice="pill" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111827;padding:32px 20px;min-height:220px;display:flex;align-items:center;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <!-- 头像 -->
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #312e81">
          <span style="font-size:28px">🐱</span>
        </div>
        <!-- 蓝色状态灯 -->
        <div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;box-shadow:0 0 8px #60a5fa"></div>
        <!-- 药丸输入框 -->
        <div style="width:200px;background:#1f2937;border-radius:999px;padding:9px 12px 9px 16px;display:flex;align-items:center;gap:8px;border:1px solid #374151">
          <span style="font-size:12px;color:#6b7280;flex:1">说点什么…</span>
          <div style="width:26px;height:26px;border-radius:50%;background:#4f46e5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
            <span style="color:#fff;font-size:11px">↑</span>
          </div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A — 药丸形</h3>
      <p>全圆角，轻盈感强，和头像圆形呼应。整体更「宠物」感。</p>
    </div>
  </div>

  <!-- Option B: 圆角矩形 + 毛玻璃 -->
  <div class="card" data-choice="glass" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111827;padding:32px 20px;min-height:220px;display:flex;align-items:center;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
        <!-- 头像 -->
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #312e81">
          <span style="font-size:28px">🐱</span>
        </div>
        <div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;box-shadow:0 0 8px #60a5fa"></div>
        <!-- 毛玻璃矩形 -->
        <div style="width:210px;background:rgba(30,30,50,0.85);border-radius:14px;padding:10px 12px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 8px 32px rgba(0,0,0,0.4)">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:#9ca3af;flex:1">说点什么…</span>
            <div style="width:26px;height:26px;border-radius:8px;background:#4f46e5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span style="color:#fff;font-size:11px">↑</span>
            </div>
          </div>
          <div style="font-size:10px;color:#4b5563;margin-top:6px">Enter 发送 · Esc 关闭</div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B — 圆角矩形 + 提示</h3>
      <p>更像「对话框」，底部有快捷键提示。信息密度略高，更「工具」感。</p>
    </div>
  </div>

  <!-- Option C: 气泡形 -->
  <div class="card" data-choice="bubble" onclick="toggleSelect(this)">
    <div class="card-image" style="background:#111827;padding:32px 20px;min-height:220px;display:flex;align-items:center;justify-content:center">
      <div style="display:flex;flex-direction:column;align-items:center;gap:0">
        <!-- 气泡 -->
        <div style="width:200px;background:#1e1e3f;border-radius:16px 16px 16px 4px;padding:10px 14px;border:1px solid #3730a3;position:relative;margin-bottom:4px">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:12px;color:#a5b4fc;flex:1">说点什么…</span>
            <div style="width:26px;height:26px;border-radius:50%;background:#4f46e5;display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <span style="color:#fff;font-size:11px">↑</span>
            </div>
          </div>
          <!-- 气泡尾巴 -->
          <div style="position:absolute;bottom:-7px;left:12px;width:12px;height:12px;background:#1e1e3f;border-right:1px solid #3730a3;border-bottom:1px solid #3730a3;transform:rotate(45deg)"></div>
        </div>
        <!-- 头像 -->
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #312e81;margin-top:8px">
          <span style="font-size:28px">🐱</span>
        </div>
        <div style="width:8px;height:8px;border-radius:50%;background:#60a5fa;box-shadow:0 0 8px #60a5fa;margin-top:6px"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C — 气泡形</h3>
      <p>像在对宠物说话，带尾巴的对话气泡。最有「聊天」感，但实现略复杂。</p>
    </div>
  </div>

</div>

<div style="margin-top:20px;padding:12px 16px;background:#111827;border-radius:10px;border:1px solid #1f2937">
  <p style="margin:0;font-size:12px;color:#6b7280">所有方案共同约定：宽度最大 220px，单行，Enter 发送，Esc / 点击外部 关闭，发送后缩回 80×80</p>
</div>
