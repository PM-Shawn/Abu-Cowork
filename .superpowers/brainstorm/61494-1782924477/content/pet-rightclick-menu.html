<h2>右键菜单</h2>
<p class="subtitle">右键点击宠物时弹出的自定义菜单。选择你想要的菜单项（可多选）。</p>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px">

  <!-- 左：菜单预览 -->
  <div>
    <div class="label" style="margin-bottom:12px">视觉预览</div>
    <div style="background:#111827;border-radius:12px;padding:32px 20px;display:flex;align-items:center;justify-content:center;min-height:280px">
      <div style="position:relative">
        <!-- 宠物头像 -->
        <div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 2px #312e81;margin:0 auto">
          <span style="font-size:28px">🐱</span>
        </div>
        <!-- 右键菜单（浮出在左上角） -->
        <div style="position:absolute;top:-130px;left:70px;width:170px;background:#1f2937;border-radius:10px;padding:6px 0;box-shadow:0 8px 32px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.08)">
          <div style="padding:8px 14px;font-size:12px;color:#e5e7eb;display:flex;align-items:center;gap:10px;cursor:pointer">
            <span style="font-size:14px">🔕</span><span>勿扰模式</span>
          </div>
          <div style="height:1px;background:#374151;margin:2px 0"></div>
          <div style="padding:8px 14px;font-size:12px;color:#e5e7eb;display:flex;align-items:center;gap:10px">
            <span style="font-size:14px">🪟</span><span>打开主窗口</span>
          </div>
          <div style="height:1px;background:#374151;margin:2px 0"></div>
          <div style="padding:8px 14px;font-size:12px;color:#9ca3af;display:flex;align-items:center;gap:10px">
            <span style="font-size:14px">👋</span><span>关闭桌宠</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 右：菜单项选择 -->
  <div>
    <div class="label" style="margin-bottom:12px">选择要包含的菜单项</div>
    <div class="options" data-multiselect style="flex-direction:column;gap:8px">

      <div class="option" data-choice="dnd" onclick="toggleSelect(this)" style="padding:12px 16px">
        <div class="letter" style="font-size:16px;width:28px;flex-shrink:0">🔕</div>
        <div class="content">
          <h3 style="font-size:13px;margin:0">勿扰模式</h3>
          <p style="font-size:11px;margin:2px 0 0">暂停 waiting 提示，宠物静默</p>
        </div>
      </div>

      <div class="option" data-choice="open-main" onclick="toggleSelect(this)" style="padding:12px 16px">
        <div class="letter" style="font-size:16px;width:28px;flex-shrink:0">🪟</div>
        <div class="content">
          <h3 style="font-size:13px;margin:0">打开主窗口</h3>
          <p style="font-size:11px;margin:2px 0 0">聚焦/唤起 Abu 主窗口</p>
        </div>
      </div>

      <div class="option" data-choice="hide-pet" onclick="toggleSelect(this)" style="padding:12px 16px">
        <div class="letter" style="font-size:16px;width:28px;flex-shrink:0">👋</div>
        <div class="content">
          <h3 style="font-size:13px;margin:0">关闭桌宠</h3>
          <p style="font-size:11px;margin:2px 0 0">隐藏窗口，可从主窗口重新开启</p>
        </div>
      </div>

      <div class="option" data-choice="status-label" onclick="toggleSelect(this)" style="padding:12px 16px">
        <div class="letter" style="font-size:16px;width:28px;flex-shrink:0">💬</div>
        <div class="content">
          <h3 style="font-size:13px;margin:0">当前状态标签</h3>
          <p style="font-size:11px;margin:2px 0 0">菜单顶部显示「空闲」/ 「处理中」等只读状态文字</p>
        </div>
      </div>

    </div>
  </div>

</div>

<div style="padding:12px 16px;background:#111827;border-radius:10px;border:1px solid #1f2937">
  <p style="margin:0;font-size:12px;color:#6b7280">菜单用自定义浮层实现（非系统原生），可完全控制样式。Tauri 的原生菜单在透明窗口上效果不佳。</p>
</div>
